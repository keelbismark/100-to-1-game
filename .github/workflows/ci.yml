name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Server Tests
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server tests
        working-directory: ./server
        run: npm test -- --coverage --maxWorkers=2

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/lcov.info
          flags: server
          name: server-codecov
          fail_ci_if_error: false

  # Client Tests
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run client linter
        working-directory: ./client
        run: npm run lint

      - name: Build client
        working-directory: ./client
        run: npm run build

  # Docker Build Test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    needs: [server-tests, client-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        run: |
          docker build -t test-server ./server

      - name: Build client Docker image
        run: |
          docker build -t test-client ./client

      - name: Test docker-compose build
        run: |
          docker-compose build

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd server && npm ci
          cd ../client && npm ci

      - name: Run npm audit (server)
        working-directory: ./server
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (client)
        working-directory: ./client
        run: npm audit --audit-level=moderate || true

  # Code Quality Check
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run ESLint
        run: |
          cd client && npm run lint || true
          cd ../server && npm test

  # Build and Package
  build-package:
    name: Build and Package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: [server-tests, client-tests, docker-build, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Build artifacts
        run: |
          cd client && npm run build
          cd ..

      - name: Create production build artifact
        run: |
          mkdir -p artifacts
          cp -r client/dist artifacts/client-dist
          cp -r server/src artifacts/server-src
          cp -r package.json package-lock.json .gitignore README.md artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: artifacts/
          retention-days: 7

  # Notification
  notify:
    name: Notify
    runs-on: ubuntu-latest
    if: always()
    needs: [server-tests, client-tests, docker-build, security-scan]

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.server-tests.result }}" == "failure" ] || \
             [ "${{ needs.client-tests.result }}" == "failure" ] || \
             [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          else
            echo "✅ Pipeline succeeded"
          fi
