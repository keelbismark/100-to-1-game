version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: 100-to-1-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
      - LOG_LEVEL=info
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - ./server/logs:/app/logs
      - ./server/data:/app/data
    restart: unless-stopped
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: 100-to-1-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - VITE_SOCKET_URL=http://localhost:5000
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', () => process.exit(0))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  game-network:
    driver: bridge

volumes:
  logs:
  data:
